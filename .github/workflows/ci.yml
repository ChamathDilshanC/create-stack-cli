name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-stacks:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Frontend
          - name: react-ts
            args: --type frontend -f react -l ts -s tailwind -q eslint-prettier
            hasBuild: true
            lint: eslint
          - name: vue-js
            args: --type frontend -f vue -l js -s tailwind -q eslint-prettier
            hasBuild: true
            lint: eslint
          - name: svelte-ts
            args: --type frontend -f svelte -l ts -s unocss -q eslint-prettier
            hasBuild: true
            lint: eslint
          # Biome's "recommended" ruleset (a11y/security/import-order) is
          # stricter than any scaffolder's default template content
          # satisfies — fastify-js below covers Biome against content this
          # CLI actually generates instead, which is what's really being
          # verified. css-modules/none here get no starter-component
          # rewrite, so the frontend's own un-rewritten demo page stays.
          - name: solid-ts
            args: --type frontend -f solid -l ts -s css-modules -q none
            hasBuild: true
            lint: none
          - name: angular-ts
            args: --type frontend -f angular -s tailwind -q eslint-prettier
            hasBuild: true
            lint: eslint
          # Fullstack
          - name: next-ts
            args: --type fullstack -f next -l ts -s tailwind -d prisma -q eslint-prettier
            hasBuild: true
            lint: eslint
          - name: nuxt-ts
            args: --type fullstack -f nuxt -l ts -s tailwind -q eslint-prettier
            hasBuild: true
            lint: eslint
          - name: sveltekit-ts
            args: --type fullstack -f sveltekit -l ts -s tailwind -d drizzle -q eslint-prettier
            hasBuild: true
            lint: eslint
          - name: astro-ts
            args: --type fullstack -f astro -l ts -s tailwind -d mongoose -q eslint-prettier
            hasBuild: true
            lint: eslint
          # Backend
          - name: express-ts
            args: --type backend -f express -l ts -d drizzle -q eslint-prettier --docker
            hasBuild: true
            lint: eslint
          - name: fastify-js
            args: --type backend -f fastify -l js -d mongoose -q biome
            hasBuild: false
            lint: biome
          - name: nestjs
            args: --type backend -f nestjs -d prisma -q eslint-prettier --docker
            hasBuild: true
            lint: eslint
          - name: hono-ts
            args: --type backend -f hono -l ts -q none
            hasBuild: true
            lint: none
          # Mobile — no npm "build" script (EAS Build is a separate, external
          # step this CI can't run), so only scaffold/install/lint apply.
          - name: expo-ts
            args: --type mobile -f expo -l ts -q eslint-prettier
            hasBuild: false
            lint: eslint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Scaffold ${{ matrix.name }}
        run: >
          node bin/cli.js /tmp/test-app
          ${{ matrix.args }}
          --pm npm
          --no-install
          --yes

      - name: Install generated project dependencies
        working-directory: /tmp/test-app
        run: npm install

      - name: Lint generated project (eslint)
        if: matrix.lint == 'eslint'
        working-directory: /tmp/test-app
        run: npx eslint .

      - name: Lint generated project (biome)
        if: matrix.lint == 'biome'
        working-directory: /tmp/test-app
        run: npx biome check .

      - name: Build generated project
        if: matrix.hasBuild
        working-directory: /tmp/test-app
        run: npm run build

  # Desktop (Tauri/Electron) needs a Rust toolchain and Linux GUI libraries
  # (webkit2gtk etc.) that standard runners don't ship — this only verifies
  # the scaffold + package.json land correctly, not a full native build.
  test-desktop-scaffold:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: tauri-ts
            args: --type desktop -f tauri -l ts -s tailwind -q eslint-prettier
          - name: electron-ts
            args: --type desktop -f electron -l ts -q eslint-prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Scaffold ${{ matrix.name }}
        run: node bin/cli.js /tmp/test-desktop ${{ matrix.args }} --pm npm --yes

      - name: Verify package.json exists
        run: test -f /tmp/test-desktop/package.json

  release:
    needs: [test-stacks, test-desktop-scaffold]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: steps.semantic.outputs.new_release_published == 'true'
        run: npm publish --access public --registry=https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Re-running setup-node rewrites the npm userconfig with a clean auth
      # entry for GitHub Packages — appending to the file by hand is fragile
      # because setup-node's generated .npmrc has no trailing newline.
      - name: Setup Node for GitHub Packages
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://npm.pkg.github.com"

      - name: Publish to GitHub Packages
        if: steps.semantic.outputs.new_release_published == 'true'
        run: npm publish --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
