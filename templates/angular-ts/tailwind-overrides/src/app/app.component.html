<main class="flex min-h-screen flex-col items-center justify-center gap-6 bg-slate-950 px-4 text-center text-slate-100">
  <h1 class="text-3xl font-bold tracking-tight">Angular</h1>
  <button
    type="button"
    (click)="increment()"
    class="rounded-lg bg-red-600 px-5 py-2.5 font-medium text-white transition hover:bg-red-500"
  >
    count is {{ count() }}
  </button>
  <p class="text-sm text-slate-400">
    Edit <code class="rounded bg-slate-800 px-1.5 py-0.5 text-slate-200">src/app/app.component.ts</code> and save to test HMR.
  </p>
</main>
